name: Render Remotion Video

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Render video
        run: npm run render

      - name: Upload final video
        uses: actions/upload-artifact@v4
        with:
          name: ai-briefing-2026-05-29
          path: remotion/renders/ai-briefing-2026-05-29.mp4
